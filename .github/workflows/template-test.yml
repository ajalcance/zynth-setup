# Self-test: generate a project from the template and run ITS gates. This is what
# guarantees a freshly stamped project is green out of the box — the template can't regress.
name: Template self-test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  generate-and-gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: minimal
            pname: CI Demo
            extra: ""
          - name: full
            pname: CI Demo
            extra: >-
              --data include_frontend=true --data include_docs_site=true
              --data include_deploy=true --data server_host=example.test
              --data include_compliance_spine=true
          # Regression guard: a long project name/slug is what breaks formatter-checked
          # files — it pushed a Python log line past ruff's 100-char limit, and made
          # prettier re-wrap interpolated TSX. Both were day-one-red bugs that the
          # short "CI Demo" name could never catch. Keep this row long.
          - name: long-name
            pname: Acme Global Compliance And Observability Platform Service
            extra: >-
              --data include_frontend=true --data include_docs_site=true
    name: generate (${{ matrix.name }})
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "20"

      - name: Install Copier
        run: pipx install copier

      - name: Generate project
        run: |
          copier copy --defaults --trust \
            --data project_name="${{ matrix.pname }}" \
            --data github_owner="ci" \
            --data author_name="CI" \
            --data author_email="ci@example.com" \
            ${{ matrix.extra }} \
            . /tmp/gen

      - name: Backend gate
        working-directory: /tmp/gen/backend
        run: |
          python -m venv .venv
          .venv/bin/pip install -q -r requirements.txt -r requirements-dev.txt
          .venv/bin/ruff check .
          .venv/bin/black --check .
          .venv/bin/mypy .
          .venv/bin/bandit -r app -ll -q
          .venv/bin/pip-audit -r requirements.txt
          .venv/bin/pytest -q --cov

      - name: Doc-consistency guards
        working-directory: /tmp/gen
        run: python scripts/dod-check.py

      # `make check` passing is NOT sufficient to commit: the generated repo's own `hygiene`
      # job (and the pre-commit hook `--trust` installs) run these, so a generated file that
      # trips end-of-file-fixer/trailing-whitespace means the adopter's FIRST COMMIT is
      # rejected. Jinja block tags at EOF are the usual culprit — `{% endif %}` on its own
      # last line emits a stray newline. Generation must produce a committable tree.
      # docs-site shipped for months with NO Dependabot coverage: a whole Next.js app whose
      # dependencies — security fixes included — were never updated. It was wired into the
      # Makefile and CI but nothing checked that the cross-cutting systems knew about it.
      # Adding a module means N systems must learn about it; this asserts one of them.
      - name: Every module's manifests have Dependabot coverage
        working-directory: /tmp/gen
        run: |
          python3 - <<'PY'
          import pathlib, sys, yaml

          root = pathlib.Path(".")
          cfg = yaml.safe_load((root / ".github/dependabot.yml").read_text())
          covered = {(u["package-ecosystem"], u["directory"].rstrip("/") or "/")
                     for u in cfg["updates"]}

          SKIP = {"node_modules", ".venv", ".next", ".git", "__pycache__"}
          MANIFESTS = {"package.json": "npm", "Dockerfile": "docker"}

          required = set()
          for path in root.rglob("*"):
              if any(part in SKIP for part in path.parts) or not path.is_file():
                  continue
              eco = MANIFESTS.get(path.name)
              if path.name.startswith("requirements") and path.suffix == ".txt":
                  eco = "pip"
              if not eco:
                  continue
              rel = path.parent.relative_to(root)
              d = "/" + ("" if str(rel) == "." else str(rel))
              required.add((eco, d.rstrip("/") or "/"))

          missing = sorted(required - covered)
          if missing:
              print("dependabot-coverage: FAILED — module manifests with no Dependabot entry:")
              for eco, d in missing:
                  print(f"  x {eco:8} {d}")
              print("\nAdd them to template/.github/dependabot.yml.")
              sys.exit(1)
          print(f"dependabot-coverage: OK — {len(required)} manifest location(s) all covered.")
          PY

      - name: Generated project passes its own pre-commit hooks
        working-directory: /tmp/gen
        run: |
          pip install pre-commit
          git add -A
          pre-commit run --all-files --show-diff-on-failure

      - name: Frontend gate
        if: matrix.name == 'full'
        working-directory: /tmp/gen/frontend
        run: |
          npm ci
          npm run lint
          npx prettier --check .
          npx tsc --noEmit
          npm audit --audit-level=high
          npm test --if-present
          npm run build

      - name: Docs-site gate
        if: matrix.name == 'full'
        working-directory: /tmp/gen/docs-site
        run: |
          npm ci
          npm run lint
          npx prettier --check .
          npm audit --audit-level=high
          npm run build

      - name: Deploy compose validates
        if: matrix.name == 'full'
        working-directory: /tmp/gen/deploy
        run: |
          cp ../.env.example ../.env
          docker compose --env-file ../.env config >/dev/null                      # local (build override)
          docker compose -f docker-compose.yml --env-file ../.env config >/dev/null # prod (signed images only)
