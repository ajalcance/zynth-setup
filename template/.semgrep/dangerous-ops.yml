# ==============================================================================
# "Dangerous Operations" ruleset (Layer 1 anti-malicious-code)
# ==============================================================================
# These rules flag code that is syntactically valid but has the CAPABILITY to
# do harm — arbitrary code execution, unsafe deserialization, destructive ops,
# obfuscation, and exfiltration signals. They catch both accidents and
# unsophisticated malice (including AI-generated mistakes).
#
# This is NOT a complete defense — a determined attacker can obfuscate around
# static rules. Runtime containment (least privilege, egress control, DB
# least-privilege, backups) is the stronger layer. See docs/SECURITY.md.
#
# Reviewed, justified exceptions: add an inline `# nosemgrep: <rule-id> — <why>`
# on the specific line. Blanket disabling is not allowed.
# ==============================================================================

rules:
  # --- Arbitrary code execution (Python) ---
  - id: sec-python-eval-exec
    languages: [python]
    severity: ERROR
    message: >
      eval()/exec() enables arbitrary code execution. Remove, or justify with a
      reviewed `# nosemgrep` and strong input controls.
    pattern-either:
      - pattern: eval(...)
      - pattern: exec(...)

  - id: sec-python-os-system
    languages: [python]
    severity: ERROR
    message: >
      os.system() runs a shell command and is a command-injection vector. Use a
      vetted, argument-list subprocess call instead.
    pattern: os.system(...)

  - id: sec-python-subprocess-shell-true
    languages: [python]
    severity: ERROR
    message: >
      subprocess with shell=True enables command injection. Pass an argument list
      and shell=False.
    patterns:
      - pattern: subprocess.$FUNC(..., shell=True, ...)

  - id: sec-python-dynamic-import
    languages: [python]
    severity: WARNING
    message: >
      Dynamic __import__ with a non-literal name can load arbitrary modules at
      runtime. Review the source of the module name.
    patterns:
      - pattern: __import__($X, ...)
      - pattern-not: __import__("...", ...)

  # --- Unsafe deserialization (remote code execution vector) ---
  - id: sec-python-insecure-deserialization
    languages: [python]
    severity: ERROR
    message: >
      Unsafe deserialization (pickle/marshal/yaml.load) can execute arbitrary
      code on load. Use JSON, or yaml.safe_load / a signed, trusted format.
    pattern-either:
      - pattern: pickle.loads(...)
      - pattern: pickle.load(...)
      - pattern: marshal.loads(...)
      - pattern: yaml.load(...)
      - pattern: cPickle.loads(...)

  # --- Obfuscation: decode-then-execute (classic poison-pill hiding) ---
  - id: sec-python-obfuscated-exec
    languages: [python]
    severity: ERROR
    message: >
      Executing decoded/compiled content (base64/compile → exec/eval) is a common
      way to hide malicious payloads. Not permitted.
    pattern-either:
      - pattern: exec(base64.$B(...))
      - pattern: eval(base64.$B(...))
      - pattern: exec(compile(...))
      - pattern: exec(bytes.fromhex(...))

  # --- Destructive filesystem operations (review required) ---
  - id: sec-python-destructive-fs
    languages: [python]
    severity: WARNING
    message: >
      Recursive/dynamic filesystem deletion. Confirm the path is constrained and
      cannot be attacker-influenced. Justify with `# nosemgrep` if intended.
    pattern-either:
      - pattern: shutil.rmtree(...)
      - pattern: os.removedirs(...)

  # --- Destructive SQL without a WHERE clause (data-loss guard) ---
  - id: sec-sql-mass-delete-or-drop
    languages: [python]
    severity: WARNING
    message: >
      Raw SQL containing DROP/TRUNCATE, or DELETE/UPDATE without WHERE, risks mass
      data loss. Use the ORM, scope with WHERE, or restrict to the migration role.
    pattern-regex: (?i)(DROP\s+TABLE|TRUNCATE\s+TABLE|DELETE\s+FROM\s+\w+\s*;|UPDATE\s+\w+\s+SET\s+[^;]+;)

  # --- Exfiltration signal: network call to a hardcoded IP ---
  - id: sec-python-request-to-hardcoded-ip
    languages: [python]
    severity: WARNING
    message: >
      Outbound request to a hardcoded IP address can indicate data exfiltration or
      C2. Use a configured, allow-listed hostname.
    pattern-regex: (?i)(requests|httpx|urllib)[.\w]*\(\s*["']https?://\d{1,3}(\.\d{1,3}){3}

  # --- JavaScript / TypeScript equivalents ---
  - id: sec-js-eval
    languages: [javascript, typescript]
    severity: ERROR
    message: >
      eval()/Function() enables arbitrary code execution. Remove or justify.
    pattern-either:
      - pattern: eval(...)
      - pattern: new Function(...)

  - id: sec-js-child-process-exec
    languages: [javascript, typescript]
    severity: ERROR
    message: >
      child_process.exec runs a shell and is a command-injection vector. Use
      execFile/spawn with an argument array.
    pattern-either:
      - pattern: require("child_process").exec(...)
      - pattern: require("node:child_process").exec(...)
      - patterns:
          - pattern: $CP.exec(...)
          - pattern-inside: |
              import $CP from "child_process"
              ...
      - patterns:
          - pattern: $CP.exec(...)
          - pattern-inside: |
              import $CP from "node:child_process"
              ...
      - patterns:
          - pattern: $CP.exec(...)
          - pattern-inside: |
              import * as $CP from "child_process"
              ...
      - patterns:
          - pattern: exec(...)
          - pattern-inside: |
              import { exec } from "child_process"
              ...
