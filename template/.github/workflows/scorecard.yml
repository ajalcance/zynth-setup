# ==============================================================================
# OSSF Scorecard — supply-chain & repo-posture monitor
# ==============================================================================
# Watches that the guardrails themselves don't erode over many AI-assisted PRs
# (branch protection, pinned actions, token permissions, dangerous workflows).
# Runs scheduled + on push to main + when a branch-protection rule changes. A
# regression turns THIS workflow red (a visible signal); it is not a per-PR gate.
#
# The Branch-Protection check needs a read token with admin — set a repo secret
# SCORECARD_TOKEN (a fine-grained PAT). Without it that one check is inconclusive
# and skipped (not failed). See ONBOARDING.md. GHAS is NOT required (results are
# uploaded as an artifact, not to the Security tab).
# ==============================================================================

name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "27 6 * * 1" # Mondays 06:27 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.json
          results_format: json
          repo_token: ${{ secrets.SCORECARD_TOKEN || github.token }}
          publish_results: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Gate on curated checks
        run: python3 scripts/scorecard_gate.py results.json --min 7

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scorecard-results
          path: results.json
          retention-days: 14
