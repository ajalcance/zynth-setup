# ==============================================================================
# CI — quality + security gate
# ==============================================================================
# Runs on every PR, and on pushes to the default branch only (see the cost note below).
# Path-filtered so a docs-only change doesn't run backend/frontend suites; jobs skip when
# their paths are absent — and a skipped job costs nothing.
#
# Actions are pinned to full commit SHAs (with a version comment); Dependabot
# (github-actions) keeps them current. `ci-complete` is the single required check.
# ==============================================================================

name: CI

# COST: GitHub bills per JOB, rounded up to a full minute — job COUNT is the cost driver,
# not job duration. A PR run and the push run that follows the merge test the same tree, so
# `push` is limited to the default branch (post-merge verification); PRs are gated by the
# pull_request run. This roughly halves total runs.
on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ---- Detect which parts of the repo changed -----------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docs: ${{ steps.filter.outputs.docs }}
      code: ${{ steps.filter.outputs.code }}
      changelog: ${{ steps.filter.outputs.changelog }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            docs:
              - 'docs-site/**'
              - 'docs/product/**'
              - 'docs/internal/**'
            code:
              - 'backend/**'
              - 'frontend/src/**'
            changelog:
              - 'CHANGELOG.md'

  # ---- Secret + hygiene scanning (always) ---------------------------------
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Run pre-commit hooks (gitleaks, detect-private-key, hygiene)
        run: |
          pip install pre-commit
          pre-commit run --all-files --show-diff-on-failure

  # ---- SAST: dangerous-ops ruleset + Semgrep security audit (always) ------
  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Install Semgrep
        run: pip install semgrep
      - name: Dangerous-operations ruleset (Layer 1 — BLOCKING)
        run: semgrep scan --config .semgrep/dangerous-ops.yml --error --metrics=off
      - name: Semgrep security audit (community rules — advisory)
        run: semgrep scan --config "p/security-audit" --config "p/secrets" --metrics=off || true

  # ---- Backend: lint + type + test + Bandit (only if backend/ changed) ----
  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (black)
        run: black --check .
      - name: Type check (mypy)
        run: mypy .
      - name: Security (bandit)
        run: bandit -r . -ll -x tests
      - name: Supply-chain audit (pip-audit)
        run: pip-audit -r requirements.txt
      - name: Tests (pytest + coverage floor)
        run: pytest -q --cov

  # ---- Frontend: lint + type + test (only if frontend/ changed) -----------
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Format check (prettier)
        run: npx prettier --check .
      - name: Type check (tsc)
        run: npx tsc --noEmit
      - name: Supply-chain audit (npm audit)
        run: npm audit --audit-level=high
      - name: Tests
        run: npm test --if-present
      # Must mirror `make frontend` exactly — a production build break is otherwise only
      # caught post-merge at image-build time (or never). Keep this list in sync.
      - name: Production build (next build)
        run: npm run build

  # ---- Docs site: lint + build (only if docs-site/ or docs content changed) ----
  docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - name: Install dependencies
        run: npm ci
      # Must mirror `make docs-site` exactly. Keep this list in sync.
      - name: Lint (eslint)
        run: npm run lint
      - name: Format check (prettier)
        run: npx prettier --check .
      - name: Supply-chain audit (npm audit)
        run: npm audit --audit-level=high
      - name: Build
        run: npm run build

  # ---- Static guards, batched (always; blocking) ---------------------------
  # doc-guards, the dependency pin guard, the meta-guard and the docs-sync nudge were four
  # separate jobs, each finishing in well under 10 seconds but each billing a FULL MINUTE.
  # Batched into one job they cost one minute instead of four, with identical coverage.
  # `changes` stays separate on purpose: it is the dependency other jobs fan out from, so a
  # doc failure here must not skip backend/frontend/docs and cost you their signal.
  static:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # the meta-guard diffs against the base branch
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: As-built + stale-reference guards
        run: python3 scripts/dod-check.py

      # Every requirement must be exactly pinned ('==' or a hash) — no floating spec an agent or
      # a resolver could bump silently. JS is deterministic via `npm ci` + package-lock integrity.
      - name: Requirements are fully pinned
        run: python3 scripts/check_pins.py backend/requirements.txt backend/requirements-dev.txt

      # An agent trying to make CI green can add # noqa / # type: ignore / # nosemgrep /
      # # pragma: no cover, or change code without a test. This diff-based check fails on net-new
      # suppressions or missing tests. Escape hatches are explicit PR labels a human must apply —
      # so an override is always a conscious act, never silent. See docs/decisions/0004.
      - name: Meta-guard (suppression ratchet + test presence + guard-file change)
        if: github.event_name == 'pull_request'
        env:
          ALLOW_SUPPRESSIONS: ${{ contains(github.event.pull_request.labels.*.name, 'allow-suppressions') }}
          ALLOW_MISSING_TESTS: ${{ contains(github.event.pull_request.labels.*.name, 'no-tests-needed') }}
          ALLOW_GUARDRAIL_CHANGE: ${{ contains(github.event.pull_request.labels.*.name, 'guardrail-change') }}
        run: |
          git fetch -q origin "${{ github.base_ref }}"
          flags=""
          [ "$ALLOW_SUPPRESSIONS" = "true" ] && flags="$flags --allow-suppressions"
          [ "$ALLOW_MISSING_TESTS" = "true" ] && flags="$flags --allow-missing-tests"
          [ "$ALLOW_GUARDRAIL_CHANGE" = "true" ] && flags="$flags --allow-guardrail-change"
          python3 scripts/meta_guard.py --base "origin/${{ github.base_ref }}" $flags

      # Advisory only — a warning annotation, never a failure.
      - name: Docs-sync nudge — code changed without a CHANGELOG entry
        if: >-
          github.event_name == 'pull_request' &&
          needs.changes.outputs.code == 'true' &&
          needs.changes.outputs.changelog != 'true' &&
          !contains(github.event.pull_request.labels.*.name, 'no-changelog')
        run: |
          echo "::warning title=Docs-sync::Code changed but CHANGELOG.md was not updated. Add an entry under [Unreleased], or label this PR 'no-changelog' if intentional."

  # ---- Required-check aggregator (the one check the branch ruleset requires) ----
  # Path-filtered jobs (backend/frontend/docs) don't run on every PR, so none of them can be a
  # required check directly — a required check that never posts blocks the PR forever. This job
  # always runs, fans in every gate, and passes only if each was 'success' or legitimately
  # 'skipped'. The branch ruleset (.github/rulesets/main.json) requires *this* context, so the gate
  # cannot be edited away in-repo. See docs/decisions/0004.
  ci-complete:
    needs: [changes, hygiene, sast, backend, frontend, docs, static]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify every gate passed (or was skipped)
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "gate results: $results"
          for r in $results; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "::error title=CI incomplete::A required gate did not pass ($r). Fix it — do not make it non-required."
              exit 1
            fi
          done
          echo "All gates green."
