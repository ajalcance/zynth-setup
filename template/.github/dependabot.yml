# Dependabot — automated dependency & GitHub Actions updates (supply-chain hygiene).
# Targets the repo's default branch. Directories without a manifest are simply no-ops
# until they exist, so entries for optional modules are safe to keep.
#
# Grouping policy: minor/patch bumps are grouped per ecosystem to cut noise, and MAJOR
# bumps are grouped into a single separate PR per ecosystem. A major bump usually needs a
# deliberate migration (a major TypeScript/ESLint bump can fail the gate until code is
# updated), so majors stay visible but land as one reviewable PR instead of flooding a
# brand-new repo with several red ones.
#
# The `docker` entries are load-bearing: base images are pinned by DIGEST, and a pinned
# digest that is never updated silently rots into an unpatched image. Pinning without
# Dependabot would be worse than not pinning at all.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: "/backend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    groups:
      backend-minor-patch:
        update-types: ["minor", "patch"]
      backend-major:
        update-types: ["major"]

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    groups:
      frontend-minor-patch:
        update-types: ["minor", "patch"]
    # Major bumps of the tooling that GATES the build (typescript 5->7, eslint 9->10,
    # jsdom 26->29) fail the frontend job until the code is migrated, and grouping them
    # does not stop them returning every week — a fresh repo just accumulates red PRs,
    # which trains the adopter to ignore Dependabot. Upgrade these deliberately instead:
    #   npm i -D typescript@latest && npm run lint && npx tsc --noEmit && npm test
    # Runtime dependencies (next, react, react-dom) still receive major bumps.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jsdom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "prettier"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@testing-library/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: "/docs-site"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "docs-site"]
    groups:
      docs-site-minor-patch:
        update-types: ["minor", "patch"]
    ignore: # same rationale as frontend
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "prettier"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/*"
        update-types: ["version-update:semver-major"]

  # --- Base images (pinned by digest — see the Dockerfiles) ---
  - package-ecosystem: docker
    directory: "/backend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "docker"]

  - package-ecosystem: docker
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "docker"]

  - package-ecosystem: docker
    directory: "/.devcontainer"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "docker"]
