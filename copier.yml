# =============================================================================
# zynth-setup — Copier template for a new enterprise-grade project.
#
#   copier copy gh:{{ '{{' }} github_owner {{ '}}' }}/zynth-setup my-new-project
#
# Stamps out a project with the full framework already wired: CLAUDE.md working
# contract, docs-as-code system, CI/CD + security gates, pre-commit hooks, and a
# fail-closed backend skeleton whose gates are green on day one.
# =============================================================================

_min_copier_version: "9.0.0"
_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml

# Keep the generated project clean: never copy template-repo meta files.
_exclude:
  - copier.yml
  - "~*"
  - "*.pyc"
  - __pycache__
  - ".git"
  - ".venv"

# --- Identity -----------------------------------------------------------------
project_name:
  type: str
  help: Human-readable project name (e.g. "Acme Auth")

project_slug:
  type: str
  help: Repo / directory slug (kebab-case)
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"

python_package:
  type: str
  help: Python package name under backend/ (snake_case, e.g. "app")
  default: app

project_description:
  type: str
  help: One-line description
  default: ""

# --- Ownership ----------------------------------------------------------------
github_owner:
  type: str
  help: GitHub org or user that will own the repo

github_repo:
  type: str
  help: Repository name on GitHub
  default: "{{ project_slug }}"

author_name:
  type: str
  help: Primary author / maintainer name
  default: ""

author_email:
  type: str
  help: Contact email (used in SECURITY.md / CODE_OF_CONDUCT.md)
  default: ""

license:
  type: str
  help: License for the generated project
  choices:
    - Apache-2.0
    - MIT
  default: Apache-2.0

initial_version:
  type: str
  help: Starting version
  default: "0.1.0"

# --- Optional stack modules (payloads land in template Phases B/C) ------------
include_frontend:
  type: bool
  help: >-
    Include a Next.js frontend (web UI)? Say yes if the service needs a user-facing
    interface. Adds a JS/TS toolchain + its own CI gate. You can add it later.
  default: false

include_docs_site:
  type: bool
  help: >-
    Include a published documentation website? Say yes to host human-friendly docs
    for others. Adds a second Next.js app to maintain. You can add it later.
  default: false

include_deploy:
  type: bool
  help: >-
    Include the deploy stack (Docker Compose + Caddy, signed-image production deploys)?
    Say yes when you're ready to run this on a real server. You can add it later.
  default: false

server_host:
  type: str
  help: Deploy target host (IP or domain) — used in deploy docs/config
  default: ""
  when: "{{ include_deploy }}"

include_compliance_spine:
  type: bool
  help: >-
    Include the compliance/observability spine (tamper-evident audit log + coverage
    guards)? Say yes if you must *prove* what the system did — audits or regulated
    data. Each new action must then satisfy 4 coverage guards. You can add it later.
  default: false

# --- Local agent ergonomics ---------------------------------------------------
include_claude_hooks:
  type: bool
  help: >-
    Include Claude Code session hooks (.claude/settings.json)? Local ergonomics
    that shift the CI guards left — auto-format backend Python on write, and
    block footguns / secret writes. CI remains the fail-closed backstop.
  default: true

# --- Post-generation setup (runs only with `copier copy --trust`) -------------
# Tasks execute shell commands, so Copier gates them behind --trust. The Python
# setup is best-effort (|| echo) so a fresh generation never hard-fails offline.
_tasks:
  # Stamp the current year into LICENSE (Jinja has no date; tasks always run since --trust is
  # required). Fills MIT `Copyright (c) <name>` and the Apache appendix `Copyright [yyyy] <name>`.
  # Best-effort (|| true): a year-less license is still valid if this ever no-ops.
  - >-
    python3 -c 'import datetime,pathlib,re;
    y=str(datetime.date.today().year);
    f=pathlib.Path("LICENSE");
    t=f.read_text() if f.exists() else "";
    t=t.replace("Copyright [yyyy] ","Copyright "+y+" ");
    t=re.sub(r"Copyright \(c\) (?!\d)","Copyright (c) "+y+" ",t);
    f.exists() and f.write_text(t)'
    || true
  - "git init -q -b main && git add -A"
  - >-
    python3 -m venv backend/.venv
    && backend/.venv/bin/pip install -q -r backend/requirements.txt -r backend/requirements-dev.txt pre-commit
    && backend/.venv/bin/pre-commit install
    || echo '⚠  Skipped Python setup (offline?). Set it up manually — see the README Quick start.'

_message_after_copy: |
  ✅ {{ project_name }} scaffolded.

  Next steps (run from the project root):
    cd backend && source .venv/bin/activate    # venv is created if you used --trust
    cd .. && make check && make dod-check       # the full gate — green on a fresh project

  If you generated without --trust, set up the venv manually (see the README Quick start).
  Review the staged files, then make your first commit.
